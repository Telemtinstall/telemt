services:
  telemt:
    image: telemt-local:latest
    container_name: telemt
    restart: unless-stopped
    network_mode: host
    environment:
      RUST_LOG: "warn"
    volumes:
      - /opt/telemt-config/telemt.toml:/etc/telemt/telemt.toml:ro
    command: ["/etc/telemt/telemt.toml"]
    healthcheck:
      test: [ "CMD", "/app/telemt", "healthcheck", "/etc/telemt/telemt.toml", "--mode", "liveness" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    pids_limit: 256
    mem_limit: 256m
    cpus: "0.50"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
